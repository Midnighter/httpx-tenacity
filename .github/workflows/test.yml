name: Test Suite

on:
  workflow_dispatch: {}
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        description: Long-lived token for submitting code coverage reports to Codecov.
        required: false

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-slim]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc # install

      - name: Check code style
        run: hatch run style:code

      - name: Check docstrings
        run: hatch run style:docstrings

      - name: Build documentation
        run: hatch run docs:build

  unit-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-slim, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      # We install hatch without its GitHub Action here, because that causes an error
      # with the distribution check on MacOS and Windows.
      - name: Install hatch
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install hatch

      - name: Check distribution
        run: hatch run distribution:check

      - name: Check dependencies
        run: hatch run audit:check

      - name: Check types
        run: hatch run types:check

      - name: Run unit tests
        run: hatch run +py=${{ matrix.python-version }} unit-tests:run -- --cov=httpx_tenacity --cov-report=term-missing --cov-report=xml

      - name: Report coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}

  acceptance-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-slim]
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc # install

      - name: Run acceptance tests
        run: hatch run +py=${{ matrix.python-version }} acceptance-tests:run -- --cov=httpx_tenacity --cov-report=term-missing --cov-report=xml

      - name: Report coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: acceptance-tests
          token: ${{ secrets.CODECOV_TOKEN }}
