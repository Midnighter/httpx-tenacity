name: CD

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+(a|b|rc|post|dev)[0-9]+"

permissions:
  contents: read

jobs:
  prerequisites:
    uses: ./.github/workflows/test.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  pyodide:
    uses: ./.github/workflows/pyodide.yml

  release:
    needs: [prerequisites, pyodide]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      # Write permissions are needed to create OIDC tokens.
      id-token: write
      # Write permissions are needed to make GitHub releases.
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc # install

      - name: Build package
        run: hatch build

      # We rely on a trusted publisher configuration being present on PyPI,
      # see https://docs.pypi.org/trusted-publishers/.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: GH release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: >
            Please see
            https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md
            for the full release notes.
          draft: false
          prerelease: false

  documentation:
    needs: [release]
    permissions:
      contents: write
    uses: ./.github/workflows/docs.yml
    with:
      version: ${{ github.ref_name }}
      alias: stable
